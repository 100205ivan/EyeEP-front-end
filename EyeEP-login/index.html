<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EyeEP 智慧化 IEP 撰寫輔助系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="login-page">
      <div class="background" aria-hidden="true">
        <div class="gradient gradient-one"></div>
        <div class="gradient gradient-two"></div>
        <div class="grid-pattern"></div>
        <div class="polygon polygon-top"></div>
        <div class="polygon polygon-bottom"></div>
        <svg class="geometry-lines" viewBox="0 0 1440 900" preserveAspectRatio="none">
          <path d="M760 110L918 192L842 348L666 308L622 154L760 110Z"></path>
          <path d="M1088 566L1284 624L1222 790L1026 766L972 626L1088 566Z"></path>
          <path d="M92 242L226 178L356 254L292 402L126 382L92 242Z"></path>
        </svg>
      </div>

      <section class="layout">
        <div class="intro-panel fade-up">
          <div class="brand-card">
            <div class="logo-mark">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2.5l2.4 5.1 5.6.8-4 3.9.9 5.5-4.9-2.6-4.9 2.6.9-5.5-4-3.9 5.6-.8L12 2.5z"></path>
              </svg>
            </div>
            <div>
              <p class="brand-name">EyeEP</p>
              <p class="brand-subtitle">Special Education AI</p>
            </div>
          </div>

          <div class="headline-block">
            <h1>智慧化 IEP 撰寫輔助系統</h1>
            <p class="english-title">
              AI-assisted Individualized Education Program Platform
            </p>
            <p class="description">
              協助教師快速建立、管理與分析 IEP 資料，整合行政流程與學生支持紀錄，讓個別化教育計畫更清楚、更有效率。
            </p>
          </div>

          <div class="feature-list">
            <article class="feature-card">
              <span class="feature-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3l7 4v5c0 4.4-2.8 7.6-7 9-4.2-1.4-7-4.6-7-9V7l7-4z"></path>
                </svg>
              </span>
              <div>
                <h2>安全資料管理</h2>
                <p>支援校務與特教行政流程</p>
              </div>
            </article>
            <article class="feature-card">
              <span class="feature-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 19V5h16v14H4zm3-3h3V8H7v8zm5 0h5v-3h-5v3zm0-5h5V8h-5v3z"></path>
                </svg>
              </span>
              <div>
                <h2>IEP 輔助撰寫</h2>
                <p>降低重複作業並提升一致性</p>
              </div>
            </article>
            <article class="feature-card">
              <span class="feature-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 20h14v-2H5v2zm1-4h3V9H6v7zm5 0h3V4h-3v12zm5 0h3v-5h-3v5z"></path>
                </svg>
              </span>
              <div>
                <h2>分析與追蹤</h2>
                <p>快速掌握學生支持狀態</p>
              </div>
            </article>
          </div>
        </div>

        <div class="form-panel fade-up delay">
          <section class="login-card">
            <div class="card-header">
              <div>
                <p class="eyebrow">歡迎回來</p>
                <h2>登入 EyeEP</h2>
              </div>
              <div class="secure-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 2l7 4v6c0 4.5-3 8.3-7 9.8C8 20.3 5 16.5 5 12V6l7-4zm3.4 8.2l-4.2 4.2-2-2-1.4 1.4 3.4 3.4 5.6-5.6-1.4-1.4z"></path>
                </svg>
              </div>
            </div>

            <form id="loginForm" novalidate>
              <div class="field-group">
                <label for="account">帳號</label>
                <div class="input-wrap">
                  <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm0 2c-3.3 0-7 1.7-7 5v1h14v-1c0-3.3-3.7-5-7-5z"></path>
                  </svg>
                  <input id="account" name="account" type="text" placeholder="請輸入帳號" autocomplete="username" />
                </div>
                <p class="error-message" id="accountError"></p>
              </div>

              <div class="field-group">
                <label for="password">密碼</label>
                <div class="input-wrap">
                  <svg class="field-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M17 9h-1V7c0-2.2-1.8-4-4-4S8 4.8 8 7v2H7c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-8c0-1.1-.9-2-2-2zm-7-2c0-1.1.9-2 2-2s2 .9 2 2v2h-4V7z"></path>
                  </svg>
                  <input id="password" name="password" type="password" placeholder="請輸入密碼" autocomplete="current-password" />
                  <button class="password-toggle" id="passwordToggle" type="button" aria-label="顯示密碼">
                    <svg class="eye-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M12 5c5 0 9 4.5 10 7-1 2.5-5 7-10 7S3 14.5 2 12c1-2.5 5-7 10-7zm0 2c-3.4 0-6.4 2.7-7.7 5 1.3 2.3 4.3 5 7.7 5s6.4-2.7 7.7-5C18.4 9.7 15.4 7 12 7zm0 2.5a2.5 2.5 0 110 5 2.5 2.5 0 010-5z"></path>
                    </svg>
                  </button>
                </div>
                <p class="error-message" id="passwordError"></p>
              </div>

              <div class="form-row">
                <label class="remember">
                  <input type="checkbox" id="rememberMe" checked />
                  <span>記住我</span>
                </label>
                <button class="link-button" type="button">忘記密碼</button>
              </div>

              <button class="login-button" id="loginButton" type="submit">
                <span class="button-text">登入系統</span>
                <span class="spinner" aria-hidden="true"></span>
                <svg class="arrow-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M13.2 5.3L20 12l-6.8 6.7-1.4-1.4 4.4-4.3H4v-2h12.2l-4.4-4.3 1.4-1.4z"></path>
                </svg>
              </button>
            </form>

            <div class="divider">
              <span></span>
              <p>快速登入入口</p>
              <span></span>
            </div>

            <div class="entry-buttons">
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 21h18v-2H3v2zm2-4h3V8H5v9zm5 0h3V8h-3v9zm5 0h3V8h-3v9zM12 2L4 6v1h16V6l-8-4z"></path>
                </svg>
                教育局單一登入
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 3L1 9l11 6 9-4.9V17h2V9L12 3zm-6 9.2V16c0 1.7 3 4 6 4s6-2.3 6-4v-3.8L12 15.5l-6-3.3z"></path>
                </svg>
                教師登入
              </button>
              <button type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 12c2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4 1.8 4 4 4zm-7 9c.5-3.4 3.4-6 7-6 1.5 0 2.9.5 4 1.2l-1.5 1.5 2.1 2.1 4.4-4.4-4.4-4.4-2.1 2.1 1.3 1.3c-1.1-.5-2.4-.8-3.8-.8-4.4 0-8.1 3.2-8.8 7.4H5z"></path>
                </svg>
                管理員登入
              </button>
            </div>
          </section>

          <p class="footer-note">EyeEP 智慧化 IEP 撰寫輔助系統 · 安全登入介面</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
